name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.9
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-checker-debug
          path: app/build/outputs/apk/debug/TVBox-Checker-*.apk

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-checker-release
          path: app/build/outputs/apk/release/TVBox-Checker-*.apk

  # 自动创建 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tvbox-checker-debug

      - name: Get version from APK filename
        id: version
        run: |
          APK_FILE=$(ls TVBox-Checker-*.apk 2>/dev/null | head -1)
          VERSION=$(echo "$APK_FILE" | grep -oP 'v\d+\.\d+\.\d+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version || format('v{0}', github.run_number) }}
          name: "TVBox Checker ${{ steps.version.outputs.version || github.run_number }}"
          files: TVBox-Checker-*.apk
          generate_release_notes: true
